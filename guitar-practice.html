<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ギター練習">
<title>ギターコード練習</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #333;
  --text: #f0f0f0; --text2: #999; --text3: #555; --accent: #d4813a;
  --warn-bg: rgba(212,129,58,0.12); --warn-border: rgba(212,129,58,0.4);
  --radius: 12px;
  --hdr: 46px; --ftr: 52px; --hist: 32px;
  --fscale: 1;
}
@media (orientation: landscape) {
  :root { --hdr: 38px; --ftr: 46px; --hist: 28px; }
}
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
}

/* ── App shell ── */
.app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
}

/* ── Header ── */
header {
  height: var(--hdr); flex-shrink: 0;
  display: flex; align-items: center; gap: 8px; padding: 0 12px;
  background: var(--bg); border-bottom: 0.5px solid var(--border); z-index: 20;
}
.hdr-title { font-size: 14px; font-weight: 700; flex: 1; white-space: nowrap; }
@media (orientation: landscape) { .hdr-title { font-size: 13px; } }
.tab-nav { display: flex; background: var(--surface2); border-radius: 20px; padding: 3px; gap: 2px; }
.tab-btn {
  font-size: 12px; padding: 3px 11px; border-radius: 17px; border: none;
  background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent; transition: all 0.15s;
}
.tab-btn.active { background: var(--accent); color: #fff; }
.gear-btn { font-size: 18px; background: none; border: none; color: var(--text2); cursor: pointer; padding: 6px; line-height: 1; -webkit-tap-highlight-color: transparent; }

/* ── Timer bar ── */
.timer-bar { height: 3px; flex-shrink: 0; background: var(--border); overflow: hidden; display: none; }
.timer-fill { height: 100%; background: var(--accent); transition: width 0.1s linear; }

/* ── Main ── */
.main-content { flex: 1; overflow: hidden; position: relative; min-height: 0; }
.view { position: absolute; inset: 0; overflow: hidden; display: none; flex-direction: column; }
.view.active { display: flex; }

/* ── Chord split: portrait=column, landscape=row ── */
.chord-split {
  flex: 1; display: flex; min-height: 0; overflow: hidden;
}
@media (orientation: portrait) {
  .chord-split { flex-direction: column; }
  .chord-pane.next-pane { border-top: 0.5px solid var(--border); }
}
@media (orientation: landscape) {
  .chord-split { flex-direction: row; }
  .chord-pane.next-pane { border-left: 0.5px solid var(--border); }
}

/* ── Chord pane ── */
.chord-pane {
  flex: 1; min-width: 0; min-height: 0;
  display: flex; overflow: hidden;
}

/* Portrait: column layout (name → diagram-wrap row) */
@media (orientation: portrait) {
  .chord-pane {
    flex-direction: column;
    overflow-y: auto;
    padding: 10px 14px;
  }
  .chord-info { margin-bottom: 10px; }
  .diagram-wrap { display: flex; flex-direction: row; gap: 10px; align-items: flex-start; }
  .chord-name { font-size: 44px; }
  svg.fret-main { width: 120px; height: auto; flex-shrink: 0; }
  svg.fret-next { width: 100px; height: auto; flex-shrink: 0; }
  .finger-head { display: block; }
  .finger-row { padding: 5px 0; }
  .fd { font-size: 12px; }
  .fs { font-size: 10px; }
  .next-chord-name { font-size: 36px; }
}

/* Landscape: row layout (chord-info | svg | finger-list) — no scroll */
@media (orientation: landscape) {
  .chord-pane {
    flex-direction: row;
    align-items: center;
    gap: 10px; padding: 6px 12px;
    overflow: hidden;
  }
  .chord-info {
    flex-shrink: 0; min-width: 52px; max-width: 90px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .diagram-wrap {
    flex: 1; display: flex; flex-direction: row;
    gap: 8px; align-items: center; min-width: 0; overflow: hidden;
  }
  .chord-name { font-size: calc(28px * var(--fscale)); line-height: 1; }
  svg.fret-main { width: calc(72px * var(--fscale)); height: auto; flex-shrink: 0; }
  svg.fret-next { width: calc(64px * var(--fscale)); height: auto; flex-shrink: 0; }
  .finger-head { display: none; }
  .finger-row { padding: 2px 0; }
  .fd { font-size: calc(11px * var(--fscale)); line-height: 1.2; }
  .fs { font-size: calc(9px * var(--fscale)); }
  .fdot { width: calc(20px * var(--fscale)); height: calc(20px * var(--fscale)); font-size: calc(9px * var(--fscale)); }
  .next-chord-name { font-size: calc(24px * var(--fscale)); }
  .next-chord-full { font-size: calc(9px * var(--fscale)); margin: 2px 0 4px; }
  .next-pane-label { font-size: calc(9px * var(--fscale)); }
  .nfdot { width: calc(17px * var(--fscale)); height: calc(17px * var(--fscale)); font-size: calc(8px * var(--fscale)); }
  .nfd { font-size: calc(10px * var(--fscale)); }
  .next-finger-row { padding: 2px 0; }
}

/* ── Shared chord styles ── */
.chord-name { font-weight: 700; line-height: 1; }
.chord-full { font-size: 11px; color: var(--text2); margin: 3px 0 0; }
.finger-list { flex: 1; min-width: 0; }
.finger-head { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.finger-row { display: flex; align-items: center; gap: 6px; border-bottom: 0.5px solid var(--border); }
.finger-row:last-child { border-bottom: none; }
.fdot { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; color: #fff; }
.fd { color: var(--text); line-height: 1.3; }
.fs { color: var(--text2); }
svg.fret-main, svg.fret-next { display: block; }

/* ── Next chord pane ── */
.next-pane-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.next-pane-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; }
.soon-badge { display: none; font-size: 10px; font-weight: 700; color: var(--accent); background: var(--warn-bg); border: 0.5px solid var(--warn-border); border-radius: 20px; padding: 2px 7px; }
.next-pane.soon .soon-badge { display: inline-block; }
.next-pane.soon .next-pane-label { color: var(--accent); }
.next-chord-name { font-weight: 700; line-height: 1; transition: color 0.2s; }
.next-pane.soon .next-chord-name { color: var(--accent); }
.next-chord-full { font-size: 11px; color: var(--text2); margin: 3px 0 0; }
.next-finger-list { flex: 1; min-width: 0; }
.next-finger-row { display: flex; align-items: center; gap: 5px; border-bottom: 0.5px solid var(--border); }
.next-finger-row:last-child { border-bottom: none; }
.nfdot { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; color: #fff; }
.nfd { font-size: 11px; color: var(--text2); }

/* ── Next pane info wrapper (for landscape) ── */
.next-chord-info {
  flex-shrink: 0; min-width: 50px; max-width: 88px;
  display: flex; flex-direction: column; justify-content: center;
}
@media (orientation: portrait) {
  .next-chord-info { margin-bottom: 8px; }
  .next-diagram-wrap { display: flex; flex-direction: row; gap: 10px; align-items: flex-start; }
  .next-pane {
    flex-direction: column; overflow-y: auto; padding: 10px 14px;
  }
}
@media (orientation: landscape) {
  .next-pane {
    flex-direction: row; align-items: center; gap: 10px; padding: 6px 12px; overflow: hidden;
  }
  .next-diagram-wrap {
    flex: 1; display: flex; flex-direction: row; gap: 8px; align-items: center; min-width: 0; overflow: hidden;
  }
}

/* ── Horizontal fret mode ── */
/* Portrait: SVG goes full-width above finger list */
@media (orientation: portrait) {
  body.horiz-fret .diagram-wrap { flex-direction: column; gap: 8px; }
  body.horiz-fret .next-diagram-wrap { flex-direction: column; gap: 6px; }
  body.horiz-fret svg.fret-main { width: 100%; max-width: 240px; height: auto; }
  body.horiz-fret svg.fret-next { width: 100%; max-width: 220px; height: auto; }
}
/* Landscape: SVG stays in row, just sized differently (shorter/wider) */
@media (orientation: landscape) {
  body.horiz-fret svg.fret-main { width: 120px; }
  body.horiz-fret svg.fret-next { width: 105px; }
}

/* ── Metronome view ── */
#view-metro { overflow-y: auto; padding: 10px; gap: 8px; }
.metro-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.metro-card-title { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
.bpm-disp-row { display: flex; align-items: baseline; gap: 4px; margin-bottom: 8px; }
.bpm-big { font-size: 34px; font-weight: 700; color: var(--accent); }
.bpm-unit { font-size: 12px; color: var(--text2); }
input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--border); outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.sig-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; background: var(--surface2); border: 0.5px solid var(--border); color: var(--text2); cursor: pointer; -webkit-tap-highlight-color: transparent; }
.sig-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
select { font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface2); color: var(--text); outline: none; }
@media (orientation: landscape) {
  #view-metro { flex-direction: row; flex-wrap: wrap; align-content: flex-start; }
  .metro-card { flex: 1 1 calc(50% - 4px); min-width: 180px; }
}

/* ── History bar ── */
.hist-bar {
  height: var(--hist); flex-shrink: 0;
  display: flex; align-items: center; gap: 6px; padding: 0 12px;
  overflow-x: auto; border-top: 0.5px solid var(--border); background: var(--bg);
}
.hist-bar::-webkit-scrollbar { display: none; }
.hist-label-sm { font-size: 10px; color: var(--text3); white-space: nowrap; }
.chip { font-size: 11px; padding: 2px 9px; border-radius: 20px; background: var(--surface); border: 0.5px solid var(--border); color: var(--text2); white-space: nowrap; }
.chip.last { background: var(--warn-bg); color: var(--accent); border-color: var(--warn-border); }

/* ── Footer ── */
footer.controls-bar {
  height: var(--ftr); flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px; padding-bottom: env(safe-area-inset-bottom);
  background: var(--surface); border-top: 0.5px solid var(--border);
}
.ctrl-btn {
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 36px; border-radius: 10px;
  border: 0.5px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 14px; cursor: pointer;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.ctrl-btn:active { opacity: 0.7; }
.ctrl-btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.ctrl-btn.playing { background: var(--accent); border-color: var(--accent); color: #fff; }
.beat-wrap { display: flex; flex-direction: column; gap: 3px; align-items: center; }
.beat-dots { display: flex; gap: 5px; }
.bdot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); transition: background 0.05s, transform 0.05s; }
.bdot.on { background: var(--accent); transform: scale(1.45); }
.bdot.accent-dot.on { background: #e05c2a; transform: scale(1.65); }
.bar-pips { display: flex; gap: 3px; }
.bar-pip { width: 8px; height: 4px; border-radius: 2px; background: var(--border); }
.bar-pip.done { background: var(--accent); }
.bar-pip.current { background: #e05c2a; }
.ftr-spacer { flex: 1; }
.bpm-ftr { font-size: 12px; color: var(--text2); white-space: nowrap; }
.bpm-ftr b { color: var(--accent); font-size: 15px; }

/* ── Settings overlay ── */
.settings-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
  display: none; align-items: flex-end; justify-content: center;
}
.settings-overlay.open { display: flex; }
.settings-panel {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 20px 20px 0 0; padding: 16px;
  padding-bottom: calc(14px + env(safe-area-inset-bottom));
  width: 100%; max-width: 520px;
  animation: slide-up 0.22s ease;
}
@keyframes slide-up { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@media (orientation: landscape) { .settings-panel { max-height: 85dvh; overflow-y: auto; } }
.settings-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.settings-title { font-size: 15px; font-weight: 700; }
.close-btn { font-size: 18px; background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px 8px; }
.settings-rows { display: flex; flex-direction: column; gap: 14px; }
.s-row { display: flex; flex-direction: column; gap: 8px; }
.s-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; }
.badge { font-size: 13px; padding: 6px 14px; border-radius: 20px; background: var(--surface2); border: 0.5px solid var(--border); color: var(--text2); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.15s; }
.badge.active { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="hdr-title">🎸 ギターコード練習</div>
    <div class="tab-nav">
      <button class="tab-btn active" onclick="showView('chord',this)">コード</button>
      <button class="tab-btn" onclick="showView('metro',this)">メトロノーム</button>
    </div>
    <button class="gear-btn" onclick="toggleSettings()">⚙</button>
  </header>

  <div class="timer-bar" id="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>

  <div class="main-content">

    <!-- コードビュー -->
    <div class="view active" id="view-chord">
      <div class="chord-split">

        <!-- 現在のコード -->
        <div class="chord-pane">
          <div class="chord-info">
            <div class="chord-name" id="cname"></div>
            <div class="chord-full" id="cfull"></div>
          </div>
          <div class="diagram-wrap">
            <svg class="fret-main" id="fretsvg" viewBox="0 0 140 200"></svg>
            <div class="finger-list">
              <div class="finger-head">指使い</div>
              <div id="finger-list"></div>
            </div>
          </div>
        </div>

        <!-- 次のコード -->
        <div class="chord-pane next-pane" id="next-pane">
          <div class="next-chord-info">
            <div class="next-pane-header">
              <span class="next-pane-label">次のコード</span>
              <span class="soon-badge">もうすぐ</span>
            </div>
            <div class="next-chord-name" id="next-name"></div>
            <div class="next-chord-full" id="next-full"></div>
          </div>
          <div class="next-diagram-wrap">
            <svg class="fret-next" id="next-fretsvg" viewBox="0 0 140 200"></svg>
            <div class="next-finger-list" id="next-finger-list"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- メトロノームビュー -->
    <div class="view" id="view-metro">
      <div class="metro-card">
        <div class="metro-card-title">BPM</div>
        <div class="bpm-disp-row">
          <span class="bpm-big" id="bpm-val2">80</span>
          <span class="bpm-unit">BPM</span>
        </div>
        <input type="range" min="40" max="220" value="80" id="bpm-slider" oninput="onBpm(this.value)">
      </div>
      <div class="metro-card">
        <div class="metro-card-title">拍子</div>
        <div class="chip-row">
          <span class="sig-btn" onclick="setSig(2,this)">2/4</span>
          <span class="sig-btn" onclick="setSig(3,this)">3/4</span>
          <span class="sig-btn active" onclick="setSig(4,this)">4/4</span>
        </div>
      </div>
      <div class="metro-card">
        <div class="metro-card-title">小節で切替</div>
        <select id="bar-sel" onchange="onBarSelChange()">
          <option value="0">オフ</option>
          <option value="1">1小節</option>
          <option value="2" selected>2小節</option>
          <option value="4">4小節</option>
          <option value="8">8小節</option>
        </select>
        <div id="bar-counter" style="font-size:11px;color:var(--text2);margin-top:6px;"></div>
      </div>
    </div>

  </div>

  <div class="hist-bar">
    <span class="hist-label-sm">履歴</span>
    <div id="hist" style="display:flex;gap:6px;flex-shrink:0;"></div>
  </div>

  <footer class="controls-bar">
    <button class="ctrl-btn" onclick="prevChord()">◀</button>
    <button class="ctrl-btn accent" onclick="nextChord()">▶</button>
    <div class="beat-wrap">
      <div class="beat-dots" id="beat-dots"></div>
      <div class="bar-pips" id="bar-progress"></div>
    </div>
    <div class="ftr-spacer"></div>
    <div class="bpm-ftr"><b id="bpm-val">80</b> BPM</div>
    <button class="ctrl-btn" id="play-btn" onclick="toggleMetro()">
      <span id="play-icon">▶</span>
    </button>
  </footer>

</div>

<!-- 設定 -->
<div class="settings-overlay" id="settings-overlay" onclick="onOverlayClick(event)">
  <div class="settings-panel" id="settings-panel">
    <div class="settings-hdr">
      <span class="settings-title">⚙ 設定</span>
      <button class="close-btn" onclick="toggleSettings()">✕</button>
    </div>
    <div class="settings-rows">
      <div class="s-row">
        <div class="s-label">レベル</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <span class="badge active" id="lv-beginner" onclick="setLevel('beginner',this)">初心者</span>
          <span class="badge" id="lv-intermediate" onclick="setLevel('intermediate',this)">中級</span>
          <span class="badge" id="lv-all" onclick="setLevel('all',this)">すべて</span>
        </div>
        <div id="chord-count-s" style="font-size:12px;color:var(--text2);"></div>
      </div>
      <div class="s-row">
        <div class="s-label">アクセント</div>
        <div style="display:flex;gap:6px;">
          <span class="sig-btn active" id="acc-first" onclick="setAccent(false)">頭打ち</span>
          <span class="sig-btn" id="acc-last" onclick="setAccent(true)">尻打ち</span>
        </div>
      </div>
      <div class="s-row">
        <div class="s-label">横向き時の文字サイズ</div>
        <div style="display:flex;gap:6px;">
          <span class="sig-btn" id="fs-1" onclick="setFontScale(0)">S</span>
          <span class="sig-btn" id="fs-2" onclick="setFontScale(1)">S+</span>
          <span class="sig-btn active" id="fs-3" onclick="setFontScale(2)">M</span>
          <span class="sig-btn" id="fs-4" onclick="setFontScale(3)">L</span>
          <span class="sig-btn" id="fs-5" onclick="setFontScale(4)">XL</span>
        </div>
      </div>
      <div class="s-row">
        <div class="s-label">フレット図の向き</div>
        <div style="display:flex;gap:6px;">
          <span class="sig-btn active" id="fret-vert" onclick="setFretOrient(false)">縦</span>
          <span class="sig-btn" id="fret-horiz" onclick="setFretOrient(true)">横</span>
        </div>
      </div>
      <div class="s-row">
        <div class="s-label">時間で切替</div>
        <select id="speed-sel" onchange="onSpeed()">
          <option value="0">オフ</option>
          <option value="5">5秒</option>
          <option value="10">10秒</option>
          <option value="20">20秒</option>
          <option value="30">30秒</option>
        </select>
        <div id="timer-text" style="font-size:11px;color:var(--text2);display:none;"></div>
      </div>
    </div>
  </div>
</div>

<script>
const CHORDS = {
  beginner: [
    { name:"Am", full:"Aマイナー", type:"beginner", barre:null, startFret:0, fingers:[{f:2,s:4,fr:2,d:"人差し指",sub:"4弦2フレット"},{f:3,s:3,fr:2,d:"中指",sub:"3弦2フレット"},{f:1,s:2,fr:1,d:"薬指",sub:"2弦1フレット"}], open:[1,6], muted:[] },
    { name:"A",  full:"Aメジャー", type:"beginner", barre:null, startFret:0, fingers:[{f:1,s:4,fr:2,d:"人差し指",sub:"4弦2フレット"},{f:2,s:3,fr:2,d:"中指",sub:"3弦2フレット"},{f:3,s:2,fr:2,d:"薬指",sub:"2弦2フレット"}], open:[1,5], muted:[6] },
    { name:"Em", full:"Eマイナー", type:"beginner", barre:null, startFret:0, fingers:[{f:2,s:5,fr:2,d:"人差し指",sub:"5弦2フレット"},{f:3,s:4,fr:2,d:"中指",sub:"4弦2フレット"}], open:[1,2,3,6], muted:[] },
    { name:"E",  full:"Eメジャー", type:"beginner", barre:null, startFret:0, fingers:[{f:2,s:5,fr:2,d:"人差し指",sub:"5弦2フレット"},{f:3,s:4,fr:2,d:"中指",sub:"4弦2フレット"},{f:1,s:3,fr:1,d:"薬指",sub:"3弦1フレット"}], open:[1,2,6], muted:[] },
    { name:"G",  full:"Gメジャー", type:"beginner", barre:null, startFret:0, fingers:[{f:2,s:6,fr:3,d:"人差し指",sub:"6弦3フレット"},{f:1,s:5,fr:2,d:"中指",sub:"5弦2フレット"},{f:3,s:1,fr:3,d:"薬指",sub:"1弦3フレット"}], open:[2,3,4], muted:[] },
    { name:"C",  full:"Cメジャー", type:"beginner", barre:null, startFret:0, fingers:[{f:3,s:5,fr:3,d:"薬指",sub:"5弦3フレット"},{f:2,s:4,fr:2,d:"中指",sub:"4弦2フレット"},{f:1,s:2,fr:1,d:"人差し指",sub:"2弦1フレット"}], open:[1,3], muted:[6] },
    { name:"D",  full:"Dメジャー", type:"beginner", barre:null, startFret:0, fingers:[{f:1,s:3,fr:2,d:"人差し指",sub:"3弦2フレット"},{f:3,s:2,fr:3,d:"薬指",sub:"2弦3フレット"},{f:2,s:1,fr:2,d:"中指",sub:"1弦2フレット"}], open:[4], muted:[5,6] },
  ],
  intermediate: [
    { name:"Dm", full:"Dマイナー", type:"intermediate", barre:null, startFret:0, fingers:[{f:1,s:1,fr:1,d:"人差し指",sub:"1弦1フレット"},{f:2,s:3,fr:2,d:"中指",sub:"3弦2フレット"},{f:3,s:2,fr:3,d:"薬指",sub:"2弦3フレット"}], open:[4], muted:[5,6] },
    { name:"Bm", full:"Bマイナー", type:"intermediate", barre:{fret:2,from:1,to:5}, startFret:1, fingers:[{f:"B",s:"1-5",fr:2,d:"人差し指（バレー）",sub:"1〜5弦2フレット"},{f:3,s:4,fr:4,d:"中指",sub:"4弦4フレット"},{f:4,s:3,fr:4,d:"薬指",sub:"3弦4フレット"},{f:2,s:2,fr:3,d:"小指",sub:"2弦3フレット"}], open:[], muted:[6] },
    { name:"F",  full:"Fメジャー", type:"intermediate", barre:{fret:1,from:1,to:6}, startFret:0, fingers:[{f:"B",s:"1-6",fr:1,d:"人差し指（バレー）",sub:"全弦1フレット"},{f:2,s:3,fr:2,d:"中指",sub:"3弦2フレット"},{f:3,s:5,fr:3,d:"薬指",sub:"5弦3フレット"},{f:4,s:4,fr:3,d:"小指",sub:"4弦3フレット"}], open:[], muted:[] },
  ]
};
const FC = {1:'#4A7C59',2:'#2C6087',3:'#8B4513',4:'#6B3A7D','B':'#d4813a'};
const FN = {1:'人',2:'中',3:'薬',4:'小','B':'B'};

let pool=[...CHORDS.beginner], deck=shuffle([...pool]);
let idx=0, hist=[];
let timerIv=null, timerMax=0, timerEl=0;
let audioCtx=null, metroOn=false, bpm=80, beats=4, accentLast=false;
let beat=0, bar=0, barsPerSwitch=2, nextT=0, schedIv=null;
let fretIsHoriz=false;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function peekNextChord(){return deck[(idx+1)%deck.length];}

function showView(id,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function toggleSettings(){document.getElementById('settings-overlay').classList.toggle('open');}
function onOverlayClick(e){if(e.target===document.getElementById('settings-overlay'))toggleSettings();}

function setLevel(lv,el){
  document.querySelectorAll('#settings-panel .badge').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  pool=lv==='beginner'?[...CHORDS.beginner]:lv==='intermediate'?[...CHORDS.intermediate]:[...CHORDS.beginner,...CHORDS.intermediate];
  deck=shuffle([...pool]); idx=0; hist=[];
  unmarkSoon(); renderHist(); render(deck[0]);
  document.getElementById('chord-count-s').textContent=pool.length+'コード';
}
function nextChord(){
  hist.push(deck[idx].name); if(hist.length>10)hist.shift();
  idx=(idx+1)%deck.length; if(idx===0)deck=shuffle([...pool]);
  unmarkSoon(); render(deck[idx]); renderHist(); resetTimer();
}
function prevChord(){idx=(idx-1+deck.length)%deck.length; unmarkSoon(); render(deck[idx]);}
function renderHist(){
  document.getElementById('hist').innerHTML=hist.map((n,i)=>`<span class="chip${i===hist.length-1?' last':''}">${n}</span>`).join('');
}
function render(c){
  document.getElementById('cname').textContent=c.name;
  document.getElementById('cfull').textContent=c.full+' — '+(c.type==='beginner'?'初心者':'中級');
  drawFret(c,document.getElementById('fretsvg'));
  drawFingers(c); renderNext();
}
function renderNext(){
  const nc=peekNextChord();
  document.getElementById('next-name').textContent=nc.name;
  document.getElementById('next-full').textContent=nc.full+' — '+(nc.type==='beginner'?'初心者':'中級');
  drawFret(nc,document.getElementById('next-fretsvg'));
  drawNextFingers(nc);
}
/* ── フレット図描画（縦：標準コードダイアグラム） ── */
function drawFretV(c,svg){
  const L=18,T=28,R=126,B=186;
  svg.setAttribute('viewBox','0 0 140 200');
  const SW=6,FT=4,sw=(R-L)/(SW-1),fh=(B-T)/FT,sf=c.startFret||0;
  let h='';
  if(sf>0) h+=`<text x="${L-3}" y="${T+7}" text-anchor="end" font-size="9" fill="#666" font-family="sans-serif">${sf}fr</text>`;
  if(sf===0) h+=`<rect x="${L}" y="${T-5}" width="${R-L}" height="5" rx="2" fill="#e0e0e0"/>`;
  for(let f=0;f<=FT;f++) h+=`<line x1="${L}" y1="${T+f*fh}" x2="${R}" y2="${T+f*fh}" stroke="#444" stroke-width="${f===0&&sf>0?1.5:0.7}"/>`;
  const sn=['e','B','G','D','A','E'];
  for(let s=0;s<SW;s++){
    const x=L+s*sw,si=6-s;
    h+=`<line x1="${x}" y1="${T}" x2="${x}" y2="${B}" stroke="#444" stroke-width="0.7"/>`;
    h+=`<text x="${x}" y="${B+13}" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">${sn[s]}</text>`;
    if(c.muted&&c.muted.includes(si)) h+=`<text x="${x}" y="${T-7}" text-anchor="middle" font-size="11" fill="#666" font-family="sans-serif">×</text>`;
    else if(c.open&&c.open.includes(si)) h+=`<circle cx="${x}" cy="${T-7}" r="4.5" fill="none" stroke="#888" stroke-width="1.2"/>`;
  }
  if(c.barre){
    const fy=T+(c.barre.fret-sf-0.5)*fh;
    const bx=L+(6-c.barre.to)*sw,bx2=L+(6-c.barre.from)*sw;
    h+=`<rect x="${bx-6}" y="${fy-8}" width="${bx2-bx+12}" height="16" rx="8" fill="${FC['B']}"/>`;
    h+=`<text x="${(bx+bx2)/2}" y="${fy+5}" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff" font-family="sans-serif">B</text>`;
  }
  c.fingers.forEach(fi=>{
    if(fi.f==='B')return;
    const x=L+(6-fi.s)*sw,y=T+(fi.fr-sf-0.5)*fh;
    h+=`<circle cx="${x}" cy="${y}" r="10" fill="${FC[fi.f]||'#666'}"/>`;
    h+=`<text x="${x}" y="${y+4}" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff" font-family="sans-serif">${FN[fi.f]}</text>`;
  });
  svg.innerHTML=h;
}

/* ── フレット図描画（横：ネックを寝かせた向き） ── */
function drawFretH(c,svg){
  // viewBox: 横230 × 縦100
  // 文字列ラベル+ミュート/オープン領域: x=0〜22、フレット領域: x=22〜225
  svg.setAttribute('viewBox','0 0 230 100');
  const L=24,T=8,R=224,B=92,SW=6,FT=4,sf=c.startFret||0;
  const sh=(B-T)/(SW-1);  // 弦間隔
  const fw=(R-L)/FT;       // フレット幅
  let h='';
  // ナット or フレット番号
  if(sf===0){
    h+=`<rect x="${L-5}" y="${T-1}" width="5" height="${B-T+2}" rx="2" fill="#e0e0e0"/>`;
  } else {
    h+=`<text x="${L+2}" y="${T-2}" font-size="9" fill="#666" font-family="sans-serif">${sf}fr</text>`;
  }
  // フレット線（縦）
  for(let f=0;f<=FT;f++){
    const x=L+f*fw;
    h+=`<line x1="${x}" y1="${T}" x2="${x}" y2="${B}" stroke="#444" stroke-width="${f===0&&sf>0?1.5:0.7}"/>`;
  }
  // 弦線（横）＋ラベル＋ミュート/オープン
  // 弦1(高いe)=上、弦6(低いE)=下
  const sLabels=['e','B','G','D','A','E'];
  for(let s=1;s<=SW;s++){
    const y=T+(s-1)*sh;
    h+=`<line x1="${L}" y1="${y}" x2="${R}" y2="${y}" stroke="#444" stroke-width="0.7"/>`;
    h+=`<text x="${L-7}" y="${y+3}" text-anchor="end" font-size="9" fill="#666" font-family="sans-serif">${sLabels[s-1]}</text>`;
    if(c.muted&&c.muted.includes(s)){
      h+=`<text x="${L-18}" y="${y+4}" text-anchor="middle" font-size="11" fill="#666" font-family="sans-serif">×</text>`;
    } else if(c.open&&c.open.includes(s)){
      h+=`<circle cx="${L-18}" cy="${y}" r="4" fill="none" stroke="#888" stroke-width="1.2"/>`;
    }
  }
  // バレー
  if(c.barre){
    const fx=L+(c.barre.fret-sf-0.5)*fw;
    const by1=T+(Math.min(c.barre.from,c.barre.to)-1)*sh;
    const by2=T+(Math.max(c.barre.from,c.barre.to)-1)*sh;
    h+=`<rect x="${fx-7}" y="${by1-6}" width="14" height="${by2-by1+12}" rx="7" fill="${FC['B']}"/>`;
    h+=`<text x="${fx}" y="${(by1+by2)/2+4}" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff" font-family="sans-serif">B</text>`;
  }
  // 指ドット
  c.fingers.forEach(fi=>{
    if(fi.f==='B')return;
    const x=L+(fi.fr-sf-0.5)*fw;
    const y=T+(fi.s-1)*sh;
    h+=`<circle cx="${x}" cy="${y}" r="7" fill="${FC[fi.f]||'#666'}"/>`;
    h+=`<text x="${x}" y="${y+3}" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff" font-family="sans-serif">${FN[fi.f]}</text>`;
  });
  svg.innerHTML=h;
}

/* ── ラッパー ── */
function drawFret(c,svg){
  fretIsHoriz ? drawFretH(c,svg) : drawFretV(c,svg);
}

/* ── 向き切替 ── */
function setFretOrient(horiz){
  fretIsHoriz=horiz;
  document.body.classList.toggle('horiz-fret',horiz);
  document.getElementById('fret-vert').classList.toggle('active',!horiz);
  document.getElementById('fret-horiz').classList.toggle('active',horiz);
  render(deck[idx]); // 再描画
}
function drawFingers(c){
  document.getElementById('finger-list').innerHTML=c.fingers.map(fi=>`<div class="finger-row"><div class="fdot" style="background:${FC[fi.f]||'#555'}">${FN[fi.f]}</div><div><div class="fd">${fi.d}</div><div class="fs">${fi.sub}</div></div></div>`).join('');
}
function drawNextFingers(c){
  document.getElementById('next-finger-list').innerHTML=c.fingers.map(fi=>`<div class="next-finger-row"><div class="nfdot" style="background:${FC[fi.f]||'#555'}">${FN[fi.f]}</div><div class="nfd">${fi.d}</div></div>`).join('');
}
function markSoon(){document.getElementById('next-pane').classList.add('soon');}
function unmarkSoon(){document.getElementById('next-pane').classList.remove('soon');}

function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function click(t,accent){
  const ctx=getCtx(),o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.frequency.value=accent?1200:800;
  g.gain.setValueAtTime(accent?0.9:0.5,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
  o.start(t);o.stop(t+0.05);
}
function sched(){
  const ctx=getCtx();
  while(nextT<ctx.currentTime+0.12){
    const acc=accentLast?beat===beats-1:beat===0;
    click(nextT,acc);
    const bSnap=beat,barSnap=bar;
    const delay=Math.max(0,(nextT-ctx.currentTime)*1000);
    setTimeout(()=>onBeatUI(bSnap,barSnap),delay);
    beat=(beat+1)%beats;
    if(beat===0){
      bar++;
      if(barsPerSwitch>1&&bar===barsPerSwitch-1){const pd=Math.max(0,(nextT-ctx.currentTime)*1000)+20;setTimeout(()=>markSoon(),pd);}
      if(barsPerSwitch===1){const pd=Math.max(0,(nextT-ctx.currentTime)*1000)+(60/bpm*beats*1000*0.5);setTimeout(()=>markSoon(),pd);}
      if(barsPerSwitch>0&&bar>=barsPerSwitch){bar=0;const sd=Math.max(0,(nextT-ctx.currentTime)*1000)+20;setTimeout(()=>nextChord(),sd);}
    }
    nextT+=60/bpm;
  }
}
function onBeatUI(b,barIdx){
  const dots=document.querySelectorAll('.bdot');
  dots.forEach((d,i)=>d.classList.toggle('on',i===b));
  setTimeout(()=>dots.forEach(d=>d.classList.remove('on')),90);
  updateBarPips(barIdx);
}
function updateBarPips(barIdx){
  if(barsPerSwitch===0){document.getElementById('bar-progress').innerHTML='';document.getElementById('bar-counter').textContent='';return;}
  document.querySelectorAll('.bar-pip').forEach((p,i)=>{p.classList.remove('done','current');if(i<barIdx)p.classList.add('done');else if(i===barIdx)p.classList.add('current');});
  document.getElementById('bar-counter').textContent=`${barIdx+1} / ${barsPerSwitch} 小節`;
}
function buildBarPips(){
  const wrap=document.getElementById('bar-progress');
  if(barsPerSwitch===0){wrap.innerHTML='';document.getElementById('bar-counter').textContent='';return;}
  wrap.innerHTML=Array.from({length:barsPerSwitch},()=>`<div class="bar-pip"></div>`).join('');
}
function startMetro(){
  const ctx=getCtx();if(ctx.state==='suspended')ctx.resume();
  beat=0;bar=0;nextT=ctx.currentTime+0.05;
  schedIv=setInterval(sched,20);metroOn=true;updateMetroUI();buildBarPips();
}
function stopMetro(){
  clearInterval(schedIv);schedIv=null;metroOn=false;
  document.querySelectorAll('.bdot').forEach(d=>d.classList.remove('on'));
  document.getElementById('bar-counter').textContent='';
  unmarkSoon();updateMetroUI();
}
function toggleMetro(){metroOn?stopMetro():startMetro();}
function updateMetroUI(){
  document.getElementById('play-icon').textContent=metroOn?'■':'▶';
  document.getElementById('play-btn').classList.toggle('playing',metroOn);
}
function onBpm(v){
  bpm=parseInt(v);
  document.getElementById('bpm-val').textContent=bpm;
  document.getElementById('bpm-val2').textContent=bpm;
}
function setSig(n,el){
  document.querySelectorAll('#view-metro .sig-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');beats=n;beat=0;bar=0;buildDots();buildBarPips();
  if(metroOn){stopMetro();startMetro();}
}
function buildDots(){
  const ai=accentLast?beats-1:0;
  document.getElementById('beat-dots').innerHTML=Array.from({length:beats},(_,i)=>`<div class="bdot${i===ai?' accent-dot':''}"></div>`).join('');
}
function setAccent(last){
  accentLast=last;
  document.getElementById('acc-first').classList.toggle('active',!last);
  document.getElementById('acc-last').classList.toggle('active',last);
  buildDots();
}
function onBarSelChange(){
  barsPerSwitch=parseInt(document.getElementById('bar-sel').value);
  bar=0;buildBarPips();unmarkSoon();
}
function onSpeed(){
  const v=parseInt(document.getElementById('speed-sel').value);
  clearIv();
  document.getElementById('timer-bar').style.display=v?'block':'none';
  document.getElementById('timer-text').style.display=v?'block':'none';
  if(v){timerMax=v;timerEl=0;startTimer();}
}
function startTimer(){
  timerIv=setInterval(()=>{
    timerEl+=0.1;
    const pct=Math.max(0,100*(1-timerEl/timerMax));
    document.getElementById('timer-fill').style.width=pct+'%';
    document.getElementById('timer-text').textContent=`次のコードまで ${Math.ceil(timerMax-timerEl)}秒`;
    if(timerEl>=timerMax)nextChord();
  },100);
}
function clearIv(){if(timerIv)clearInterval(timerIv);timerIv=null;}
function resetTimer(){
  const v=parseInt(document.getElementById('speed-sel').value);
  if(v){clearIv();timerEl=0;document.getElementById('timer-fill').style.width='100%';startTimer();}
}

const FSCALES=[0.72,0.86,1.0,1.18,1.38];
let fsLevel=2;
function setFontScale(level){
  fsLevel=level;
  document.documentElement.style.setProperty('--fscale',FSCALES[level]);
  ['fs-1','fs-2','fs-3','fs-4','fs-5'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('active',i===level);
  });
}

buildDots(); buildBarPips(); render(deck[0]);
document.getElementById('chord-count-s').textContent=pool.length+'コード';
</script>
</body>
</html>
